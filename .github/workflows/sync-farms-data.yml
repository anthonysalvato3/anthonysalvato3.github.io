name: Sync Farms Data

on:
  schedule:
    - cron: "0 8 * * *" # Runs at 8 AM UTC (1 hour before nightly build)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download KML and convert to GeoJSON
        run: python scripts/sync-farms-kml.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet assets/data/farms.geojson && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/farms.geojson
          git commit -m "Update farms data from Google My Maps"
          git push
